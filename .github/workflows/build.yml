name: Build ESP8266 Firmware

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Arduino CLI
        uses: arduino/setup-arduino-cli@v2
        with:
          version: 0.32.1

      - name: Configure ESP8266 Board Manager
        run: |
          rm -f ~/.arduino15/arduino-cli.yaml
          arduino-cli config init
          arduino-cli config set board_manager.additional_urls https://arduino.esp8266.com/stable/package_esp8266com_index.json
          arduino-cli core update-index

      - name: Install ESP8266 platform
        run: arduino-cli core install esp8266:esp8266

      - name: Compile Wi-PWN firmware
        run: arduino-cli compile --fqbn esp8266:esp8266:nodemcuv2 Wi-PWN/Wi-PWN.ino

      - name: Upload firmware .bin
        uses: actions/upload-artifact@v4
        with:
          name: Wi-PWN-firmware
          path: Wi-PWN/build/*.bin
