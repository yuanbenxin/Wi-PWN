name: Build ESP8266 Firmware

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Arduino CLI
        uses: arduino/setup-arduino-cli@v2
        with:
          version: 0.32.1
      - name: Install ESP8266 core
        run: |
          arduino-cli core update-index
          arduino-cli core install esp8266:esp8266
      - name: Compile Wi-PWN firmware
        run: |
          arduino-cli compile --fqbn esp8266:esp8266:nodemcuv2 Wi-PWN/Wi-PWN.ino
      - name: Export build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Wi-PWN-firmware
          path: Wi-PWN/build/*.bin
